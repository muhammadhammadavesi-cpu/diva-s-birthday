<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Happy Birthday</title>
<style>

@import url('https://fonts.googleapis.com/css2?family=Indie+Flower&display=swap');

body {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  background-image: url("background.jfif");
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  background-attachment: fixed;
  font-family: "Indie Flower", cursive;
  font-weight: 400;
  position: relative;
  overflow-x: hidden;
}

/* ── Entry Animations ── */
@keyframes popIn {
  0%   { opacity: 0; transform: scale(0.4) translateY(30px); }
  65%  { transform: scale(1.08) translateY(-6px); }
  82%  { transform: scale(0.96) translateY(2px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}
@keyframes floatIn-left {
  0%   { opacity: 0; transform: translateX(-60px) rotate(-8deg) scale(0.7); }
  60%  { transform: translateX(10px) rotate(3deg) scale(1.04); }
  100% { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
}
@keyframes floatIn-right {
  0%   { opacity: 0; transform: translateX(60px) rotate(8deg) scale(0.7); }
  60%  { transform: translateX(-10px) rotate(-3deg) scale(1.04); }
  100% { opacity: 1; transform: translateX(0) rotate(0deg) scale(1); }
}
@keyframes riseUp {
  0%   { opacity: 0; transform: translateY(45px) scale(0.85); }
  60%  { transform: translateY(-8px) scale(1.03); }
  80%  { transform: translateY(4px) scale(0.98); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Confetti ── */
@keyframes confettiFall {
  0%   { transform: translateY(-20px) rotate(0deg) scale(1); opacity: 1; }
  80%  { opacity: 1; }
  100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
}
.confetti-piece {
  position: fixed;
  top: -10px;
  width: 10px;
  height: 10px;
  border-radius: 2px;
  pointer-events: none;
  z-index: 9999;
  animation: confettiFall linear forwards;
}

/* ── Candles ── */
@keyframes flicker {
  0%,100% { transform: scaleX(1)    scaleY(1)    rotate(-2deg); opacity: 1; }
  25%      { transform: scaleX(0.85) scaleY(1.1)  rotate(2deg);  opacity: 0.9; }
  50%      { transform: scaleX(1.1)  scaleY(0.92) rotate(-1deg); opacity: 1; }
  75%      { transform: scaleX(0.9)  scaleY(1.05) rotate(3deg);  opacity: 0.95; }
}
@keyframes candleAppear {
  0%   { opacity: 0; transform: translateY(10px) scale(0.5); }
  60%  { transform: translateY(-4px) scale(1.1); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

#cake-wrapper {
  position: relative;
  width: 20%;
  display: flex;
  align-items: flex-end;
  justify-content: center;
}
#cake-img { width: 100%; display: block; }
#candles-container {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}

.candle {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  animation: candleAppear 0.6s cubic-bezier(0.34,1.5,0.64,1) forwards;
}
.candle-body {
  width: 6px;
  height: 18px;
  border-radius: 2px;
  background: linear-gradient(180deg, #fff8c0 0%, #f5d020 100%);
  box-shadow: 0 0 3px rgba(245,208,32,0.5);
}
.flame-wrapper {
  position: relative;
  width: 14px;
  height: 20px;
  margin-bottom: 1px;
}
.flame-outer {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  width: 12px; height: 18px;
  background: radial-gradient(ellipse at 50% 80%, #ff9800 0%, #ffeb3b 40%, transparent 75%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 0.6s ease-in-out infinite;
  transform-origin: bottom center;
  filter: blur(0.5px);
}
.flame-inner {
  position: absolute;
  bottom: 1px; left: 50%;
  transform: translateX(-50%);
  width: 6px; height: 10px;
  background: radial-gradient(ellipse at 50% 80%, #fff8e1 0%, #ffe082 60%, transparent 100%);
  border-radius: 50% 50% 30% 30%;
  animation: flicker 0.5s ease-in-out infinite reverse;
  transform-origin: bottom center;
}
.glow {
  position: absolute;
  bottom: -2px; left: 50%;
  transform: translateX(-50%);
  width: 20px; height: 20px;
  background: radial-gradient(circle, rgba(255,200,50,0.55) 0%, transparent 70%);
  border-radius: 50%;
  animation: flicker 0.7s ease-in-out infinite;
}

/* ── Music Indicator ── */
@keyframes musicPop {
  0%   { opacity: 0; transform: translateY(10px) scale(0.7); }
  60%  { transform: translateY(-5px) scale(1.1); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes noteBob {
  0%,100% { transform: translateY(0) rotate(-5deg); }
  50%      { transform: translateY(-6px) rotate(5deg); }
}
#music-indicator {
  display: none;
  position: fixed;
  top: 22px; right: 22px;
  background: rgba(255,255,255,0.82);
  backdrop-filter: blur(6px);
  border-radius: 30px;
  padding: 8px 18px 8px 12px;
  font-size: 1rem;
  color: rgb(110,0,0);
  font-family: "Indie Flower", cursive;
  font-weight: 600;
  box-shadow: 0 4px 18px rgba(0,0,0,0.13);
  align-items: center;
  gap: 8px;
  z-index: 1000;
  cursor: pointer;
  animation: musicPop 0.5s cubic-bezier(0.34,1.5,0.64,1) forwards;
}
#music-indicator.visible { display: flex; }
#music-note {
  font-size: 1.3rem;
  display: inline-block;
  animation: noteBob 1s ease-in-out infinite;
}

/* ── Entry animation states ── */
#cat1, #cake-wrapper, #flowers, button { opacity: 0; }

#cat1         { animation: floatIn-left  0.9s cubic-bezier(0.34,1.4,0.64,1) 0.2s  forwards; }
#cake-wrapper { animation: popIn         1s   cubic-bezier(0.34,1.5,0.64,1) 0.5s  forwards; }
#flowers      { animation: floatIn-right 0.9s cubic-bezier(0.34,1.4,0.64,1) 0.3s  forwards; }
button:nth-of-type(1) { animation: riseUp 0.75s cubic-bezier(0.34,1.45,0.64,1) 0.85s forwards; }
button:nth-of-type(2) { animation: riseUp 0.75s cubic-bezier(0.34,1.45,0.64,1) 1.05s forwards; }
button:nth-of-type(3) { animation: riseUp 0.75s cubic-bezier(0.34,1.45,0.64,1) 1.25s forwards; }

/* ── Layout ── */
#main-cont {
  height: 100vh; width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}
#cat1 {
  position: absolute;
  width: 20%; left: 10%;
}
#flowers {
  position: absolute;
  width: 20%; right: 10%;
}
button {
  padding: 10px 22px;
  font-size: 1.2rem;
  font-family: "Indie Flower", cursive;
  font-weight: 600;
  border: none;
  border-radius: 25px;
  background: #ecedd2;
  color: rgb(110, 0, 0);
  cursor: pointer;
  margin: 15px;
  transition: background 0.3s, transform 0.2s;
}
button:hover { background: #ffd7d7; transform: scale(1.06); }

@media (max-width:450px) {

#main-cont{
  margin-top: 50px;
}

#cake-wrapper{
  width: 55%;
}

#cat1 {
  width: 30%; left: 1%;
  bottom: 30%;
}

#flowers {
  width: 30%; right: 1%;
  bottom: 28%;
}

}
</style>
</head>
<body>

<div id="main-cont">
  <img src="cat.png" id="cat1">

  <div id="cake-wrapper">
    <img src="cake.png" id="cake-img">
    <div id="candles-container"></div>
  </div>

  <img src="flowers.png" id="flowers">

  <button id="surprise-btn" onclick="triggerSurprise()">Click for Surprise</button>
  <!-- surprise page preloaded for instant navigation -->
  <link rel="prefetch" href="surprise.html">
  <button onclick="window.location.href='aletter.html'">Read My Letter</button>
  <button onclick="window.location.href='diva.html'">Who's that diva?</button>
</div>

<div id="music-indicator" onclick="toggleMusic()">
  <span id="music-note">🎵</span>
  <span id="music-label">Playing ♪ tap to pause</span>
</div>

<audio id="birthday-audio" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
  let musicPlaying = false;
  const audio = document.getElementById('birthday-audio');

  /* ── Main trigger ── */
  function triggerSurprise() {
    launchConfetti();
    lightCandles();
    playMusic();

    const btn = document.getElementById('surprise-btn');
    btn.textContent = '🎉 Opening...';
    btn.style.background = '#ffd7d7';
    btn.disabled = true;

    // Let confetti burst for a moment, then navigate
    setTimeout(() => {
      window.location.href = 'surprise.html';
    }, 900);
  }

  /* ── Confetti ── */
  function launchConfetti() {
    const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff6bce','#ffb347','#c77dff','#ff4d6d','#ffffff'];
    const shapes = ['square','circle','rect'];

    for (let i = 0; i < 150; i++) {
      setTimeout(() => {
        const el = document.createElement('div');
        el.classList.add('confetti-piece');

        const shape = shapes[Math.floor(Math.random() * shapes.length)];
        if (shape === 'circle') {
          el.style.borderRadius = '50%';
        } else if (shape === 'rect') {
          el.style.width = '5px';
          el.style.height = '14px';
        }

        el.style.left              = Math.random() * 100 + 'vw';
        el.style.backgroundColor   = colors[Math.floor(Math.random() * colors.length)];
        el.style.animationDuration = (1.8 + Math.random() * 2.4) + 's';
        el.style.animationDelay    = (Math.random() * 0.5) + 's';

        document.body.appendChild(el);
        setTimeout(() => el.remove(), 5500);
      }, i * 7);
    }
  }

  /* ── Candles ── */
  function lightCandles() {
    const container = document.getElementById('candles-container');
    if (container.children.length > 0) return; // already lit

    // Adjust left% / top% to match where candles sit on YOUR cake image
    const positions = [
      { left: 30, top: 10 },
      { left: 45, top:  6 },
      { left: 60, top: 10 },
    ];

    positions.forEach((pos, i) => {
      const candle = document.createElement('div');
      candle.className = 'candle';
      candle.style.left           = pos.left + '%';
      candle.style.top            = pos.top  + '%';
      candle.style.animationDelay = (0.15 * i) + 's';

      candle.innerHTML = `
        <div class="flame-wrapper">
          <div class="glow"></div>
          <div class="flame-outer"></div>
          <div class="flame-inner"></div>
        </div>
        <div class="candle-body"></div>
      `;

      container.appendChild(candle);
    });
  }

  /* ── Music ── */
  function playMusic() {
    if (musicPlaying) return;
    audio.volume = 0.7;
    audio.play().then(() => {
      musicPlaying = true;
      showMusicIndicator('Playing ♪ tap to pause', '🎵');
    }).catch(() => {
      // Autoplay blocked by browser
      showMusicIndicator('Tap here to play music 🎵', '🔇');
      document.getElementById('music-indicator').onclick = function() {
        audio.play().then(() => {
          musicPlaying = true;
          showMusicIndicator('Playing ♪ tap to pause', '🎵');
          this.onclick = toggleMusic;
        });
      };
    });
  }

  function showMusicIndicator(label, note) {
    const indicator = document.getElementById('music-indicator');
    indicator.classList.add('visible');
    document.getElementById('music-label').textContent = label;
    document.getElementById('music-note').textContent  = note;
  }

  function toggleMusic() {
    if (musicPlaying) {
      audio.pause();
      musicPlaying = false;
      showMusicIndicator('Paused ♪ tap to play', '🔇');
    } else {
      audio.play();
      musicPlaying = true;
      showMusicIndicator('Playing ♪ tap to pause', '🎵');
    }
  }
</script>

</body>
</html>
